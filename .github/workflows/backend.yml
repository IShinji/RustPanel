name: Release CI & Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-deprecation'
  BACKEND_IMAGE_PLATFORM: linux/amd64

jobs:
  verify:
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: ./scripts/verify-all.sh

  build-backend-image:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    steps:
      - uses: actions/checkout@v6
      - id: backend-crate
        run: |
          if [ -f src/backend/Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v4
        if: steps.backend-crate.outputs.exists == 'true'
      - uses: docker/login-action@v4
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          context: .
          file: src/backend/Dockerfile
          platforms: ${{ env.BACKEND_IMAGE_PLATFORM }}
          push: true
          tags: ghcr.io/ishinji/rustpanel-backend:latest,ghcr.io/ishinji/rustpanel-backend:sha-${{ github.sha }}
      - if: steps.backend-crate.outputs.exists != 'true'
        run: echo "src/backend/Cargo.toml not found; skipping backend image build."
