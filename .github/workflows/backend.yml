name: Release CI & Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-deprecation'
  BACKEND_IMAGE_PLATFORM: linux/amd64
  BACKEND_IMAGE_CACHE_NAME: backend-image
  BACKEND_IMAGE_CACHE_FAMILY: rust-backend-linux-amd64-v1
  BUILDKIT_CACHE_PROJECT: rustpanel
  BUILDKIT_CACHE_ROOT: ${{ vars.BUILDKIT_CACHE_ROOT || '/cache/buildkit' }}

jobs:
  verify:
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: rustup component add rustfmt clippy
      - run: ./scripts/verify-all.sh

  build-backend-image:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    steps:
      - uses: actions/checkout@v6
      - id: backend-crate
        run: |
          if [ -f src/backend/Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
        if: steps.backend-crate.outputs.exists == 'true'
      - name: Build root TypeScript scripts
        if: steps.backend-crate.outputs.exists == 'true'
        run: bun install --frozen-lockfile && bun run scripts:build
      - name: Warm Docker base image cache
        if: steps.backend-crate.outputs.exists == 'true'
        run: scripts/warm-docker-base-images.sh src/backend/Dockerfile
      - name: Validate backend image BuildKit cache
        if: steps.backend-crate.outputs.exists == 'true'
        env:
          CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}
        run: node dist/node-scripts/scripts/validate-buildkit-local-cache.js --path "$CACHE_PATH" --quarantine --label backend-image
      - name: Collect backend image cache imports
        if: steps.backend-crate.outputs.exists == 'true'
        id: backend-cache
        env:
          LOCAL_CACHE_DEST: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}-next-${{ github.run_id }}
          REGISTRY_CACHE: ghcr.io/${{ github.repository_owner }}/rustpanel-backend:buildcache
        run: |
          node dist/node-scripts/scripts/collect-buildkit-cache-imports.js \
            --cache-root "$BUILDKIT_CACHE_ROOT" \
            --family "$BACKEND_IMAGE_CACHE_FAMILY" \
            --project "$BUILDKIT_CACHE_PROJECT" \
            --cache-name "$BACKEND_IMAGE_CACHE_NAME" \
            --local-dest "$LOCAL_CACHE_DEST" \
            --registry-cache "$REGISTRY_CACHE" \
            --include-legacy-root-peers
      - name: Prepare backend image cache export
        if: steps.backend-crate.outputs.exists == 'true'
        env:
          NEXT_CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}-next-${{ github.run_id }}
        run: |
          mkdir -p "$(dirname "$NEXT_CACHE_PATH")"
          find "$(dirname "$NEXT_CACHE_PATH")" -mindepth 1 -maxdepth 1 -type d -name "${BACKEND_IMAGE_CACHE_NAME}-next-*" -mtime +1 -exec rm -rf "{}" +
          rm -rf "$NEXT_CACHE_PATH"
      - uses: docker/setup-buildx-action@v4
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          name: rustpanel-backend-image-builder
          keep-state: true
          cleanup: false
          cache-binary: false
      - uses: docker/login-action@v4
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        if: steps.backend-crate.outputs.exists == 'true'
        with:
          builder: rustpanel-backend-image-builder
          context: .
          file: src/backend/Dockerfile
          platforms: ${{ env.BACKEND_IMAGE_PLATFORM }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rustpanel-backend:latest,ghcr.io/${{ github.repository_owner }}/rustpanel-backend:sha-${{ github.sha }}
          cache-from: ${{ steps.backend-cache.outputs.cache-from }}
          cache-to: ${{ steps.backend-cache.outputs.cache-to }}
      - name: Promote backend image BuildKit cache
        if: success() && steps.backend-crate.outputs.exists == 'true'
        env:
          CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}
          NEXT_CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}-next-${{ github.run_id }}
          PREVIOUS_CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}-prev
        run: |
          if [ ! -d "$NEXT_CACHE_PATH" ]; then
            echo "No backend image cache export found at $NEXT_CACHE_PATH"
            exit 0
          fi

          rm -rf "$PREVIOUS_CACHE_PATH"
          if [ -d "$CACHE_PATH" ]; then
            mv "$CACHE_PATH" "$PREVIOUS_CACHE_PATH"
          fi
          mv "$NEXT_CACHE_PATH" "$CACHE_PATH"
          rm -rf "$PREVIOUS_CACHE_PATH"
      - name: Summarize backend image
        if: always() && steps.backend-crate.outputs.exists == 'true'
        env:
          CACHE_IMPORTS: ${{ steps.backend-cache.outputs.summary }}
          CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}
          NEXT_CACHE_PATH: ${{ env.BUILDKIT_CACHE_ROOT }}/${{ env.BACKEND_IMAGE_CACHE_FAMILY }}/${{ env.BUILDKIT_CACHE_PROJECT }}/${{ env.BACKEND_IMAGE_CACHE_NAME }}-next-${{ github.run_id }}
        run: |
          {
            echo "### Backend image"
            echo "- BuildKit cache: \`$CACHE_PATH\`"
            echo "- BuildKit cache export: \`$NEXT_CACHE_PATH\`"
            if [ -n "$CACHE_IMPORTS" ]; then
              echo "- BuildKit cache sources:"
              printf '%s\n' "$CACHE_IMPORTS" | while IFS= read -r source; do
                [ -n "$source" ] && echo "  - \`$source\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - if: steps.backend-crate.outputs.exists != 'true'
        run: echo "src/backend/Cargo.toml not found; skipping backend image build."
