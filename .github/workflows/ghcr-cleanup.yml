name: GHCR Package Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '17 11 * * 0'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-deprecation'
  GHCR_CLEANUP_OWNER: 'IShinji'
  GHCR_CLEANUP_PACKAGE: 'rustpanel-backend'
  GHCR_CLEANUP_PACKAGE_TYPE: container
  GHCR_CLEANUP_KEEP_SHA: '15'
  GHCR_CLEANUP_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN || github.token }}

jobs:
  cleanup:
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Verify runner Bun
        run: bun --revision
      - run: |
          bun install --frozen-lockfile
          bun run scripts:build
      - run: |
          args=(
            --owner "$GHCR_CLEANUP_OWNER"
            --package "$GHCR_CLEANUP_PACKAGE"
            --package-type "$GHCR_CLEANUP_PACKAGE_TYPE"
            --keep-sha "$GHCR_CLEANUP_KEEP_SHA"
          )
          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--execute)
          fi
          node dist/node-scripts/scripts/cleanup-ghcr-package-versions.js "${args[@]}"
