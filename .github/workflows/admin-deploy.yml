name: Admin CI & Deploy

on:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        required: false
        default: false
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-deprecation'

jobs:
  admin-ci:
    runs-on: [self-hosted, Linux, ARM64, m4-runner, rustpanel-runner]
    defaults:
      run:
        working-directory: src/admin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Verify runner Bun
        run: bun --revision
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test
      - run: bun run build
