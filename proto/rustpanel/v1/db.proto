syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// DatabaseEngine 描述数据库引擎。
enum DatabaseEngine {
  DATABASE_ENGINE_UNSPECIFIED = 0;
  DATABASE_ENGINE_MYSQL = 1;
  DATABASE_ENGINE_POSTGRES = 2;
  DATABASE_ENGINE_SQLITE = 3;
}

// DatabaseItem 描述数据库。
message DatabaseItem {
  string name = 1;
}

// ListDatabasesRequest 表示数据库列表请求。
message ListDatabasesRequest {
  string dsn = 1;
}

// ListDatabasesResponse 返回数据库列表。
message ListDatabasesResponse {
  Response status = 1;
  repeated DatabaseItem databases = 2;
}

// CreateDatabaseRequest 表示创建数据库请求。
message CreateDatabaseRequest {
  string dsn = 1;
  string name = 2;
}

// CreateDatabaseResponse 返回创建数据库结果。
message CreateDatabaseResponse {
  Response status = 1;
}

// CreateDatabaseUserRequest 表示创建数据库用户请求。
message CreateDatabaseUserRequest {
  string dsn = 1;
  string username = 2;
  string password = 3;
  string database = 4;
}

// CreateDatabaseUserResponse 返回创建数据库用户结果。
message CreateDatabaseUserResponse {
  Response status = 1;
}

// ExecuteSqlRequest 表示 SQL 执行请求。
message ExecuteSqlRequest {
  string dsn = 1;
  string sql = 2;
  uint32 max_rows = 3;
}

// SqlRow 表示 SQL 结果行。
message SqlRow {
  repeated string values = 1;
}

// ExecuteSqlResponse 返回 SQL 执行结果。
message ExecuteSqlResponse {
  Response status = 1;
  repeated string columns = 2;
  repeated SqlRow rows = 3;
  uint64 rows_affected = 4;
}

// ListTablesRequest 列出某连接下的表。
message ListTablesRequest {
  string dsn = 1;
}

// ListTablesResponse 返回表名列表。
message ListTablesResponse {
  Response status = 1;
  repeated string tables = 2;
}

// BrowseTableRequest 分页浏览某张表的数据。
message BrowseTableRequest {
  string dsn = 1;
  string table = 2;
  uint32 limit = 3;
  uint32 offset = 4;
}

// BrowseTableResponse 返回该页数据 + 估算/精确总行数。
message BrowseTableResponse {
  Response status = 1;
  repeated string columns = 2;
  repeated SqlRow rows = 3;
  uint64 total_rows = 4;
}

// BackupDatabaseRequest 表示数据库备份请求。
message BackupDatabaseRequest {
  string dsn = 1;
  string database = 2;
}

// BackupDatabaseResponse 返回数据库备份入口。
message BackupDatabaseResponse {
  Response status = 1;
  string download_url = 2;
}

// SqliteFile 描述一个 SQLite 数据库文件。
message SqliteFile {
  string path = 1;
  uint64 size_bytes = 2;
  uint64 modified_at_seconds = 3;
}

message ListSqliteFilesRequest {
  // 扫描目录,空时使用 RUSTPANEL_SQLITE_ROOTS 环境变量或默认路径
  repeated string scan_dirs = 1;
}

message ListSqliteFilesResponse {
  Response status = 1;
  repeated SqliteFile files = 2;
}

message CreateSqliteFileRequest {
  string path = 1;
}

message CreateSqliteFileResponse {
  Response status = 1;
  SqliteFile file = 2;
}

message VacuumSqliteRequest {
  string path = 1;
}

message VacuumSqliteResponse {
  Response status = 1;
  uint64 size_before_bytes = 2;
  uint64 size_after_bytes = 3;
}

// RedisInfo 是 Redis INFO 命令解析后的精简视图,只保留监控关心的关键指标。
message RedisInfo {
  bool reachable = 1;
  string version = 2;
  string mode = 3;
  uint64 connected_clients = 4;
  uint64 used_memory_bytes = 5;
  uint64 max_memory_bytes = 6;
  string max_memory_policy = 7;
  uint64 keyspace_hits = 8;
  uint64 keyspace_misses = 9;
  uint64 total_commands_processed = 10;
  uint64 uptime_seconds = 11;
  string error = 12;
}

message GetRedisInfoRequest {
  // 默认 redis://127.0.0.1:6379
  string url = 1;
}

message GetRedisInfoResponse {
  Response status = 1;
  RedisInfo info = 2;
}

// DatabaseService 提供数据库直连管理能力。
service DatabaseService {
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc CreateDatabase(CreateDatabaseRequest) returns (CreateDatabaseResponse);
  rpc CreateDatabaseUser(CreateDatabaseUserRequest) returns (CreateDatabaseUserResponse);
  rpc ExecuteSql(ExecuteSqlRequest) returns (ExecuteSqlResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc BrowseTable(BrowseTableRequest) returns (BrowseTableResponse);
  rpc BackupDatabase(BackupDatabaseRequest) returns (BackupDatabaseResponse);
  // === Phase D: 轻量数据库优先 ===
  rpc ListSqliteFiles(ListSqliteFilesRequest) returns (ListSqliteFilesResponse);
  rpc CreateSqliteFile(CreateSqliteFileRequest) returns (CreateSqliteFileResponse);
  rpc VacuumSqlite(VacuumSqliteRequest) returns (VacuumSqliteResponse);
  rpc GetRedisInfo(GetRedisInfoRequest) returns (GetRedisInfoResponse);
}
