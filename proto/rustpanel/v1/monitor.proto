syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// CpuCoreStatus 描述单个 CPU 核心的实时占用。
message CpuCoreStatus {
  uint32 core_id = 1;
  float usage_percent = 2;
  uint64 frequency_mhz = 3;
}

// MemoryStatus 描述内存与交换分区占用。
message MemoryStatus {
  uint64 total_bytes = 1;
  uint64 used_bytes = 2;
  uint64 available_bytes = 3;
  uint64 swap_total_bytes = 4;
  uint64 swap_used_bytes = 5;
}

// LoadAverageStatus 描述系统负载。
message LoadAverageStatus {
  double one_minute = 1;
  double five_minutes = 2;
  double fifteen_minutes = 3;
}

// NetworkIoStatus 描述网络接口读写字节。
message NetworkIoStatus {
  string interface_name = 1;
  uint64 received_bytes = 2;
  uint64 transmitted_bytes = 3;
}

// DiskIoStatus 描述磁盘读写字节。
message DiskIoStatus {
  string disk_name = 1;
  string mount_point = 2;
  uint64 total_space_bytes = 3;
  uint64 available_space_bytes = 4;
  uint64 read_bytes = 5;
  uint64 written_bytes = 6;
}

// SystemStatus 汇总服务器实时资源状态。
message SystemStatus {
  uint64 timestamp_seconds = 1;
  float cpu_usage_percent = 2;
  repeated CpuCoreStatus cpu_cores = 3;
  MemoryStatus memory = 4;
  LoadAverageStatus load_average = 5;
  repeated NetworkIoStatus networks = 6;
  repeated DiskIoStatus disks = 7;
  uint64 uptime_seconds = 8;
}

// GetSystemStatusRequest 表示一次性系统状态读取请求。
message GetSystemStatusRequest {}

// GetSystemStatusResponse 返回一次性系统状态。
message GetSystemStatusResponse {
  Response status = 1;
  SystemStatus system_status = 2;
}

// WatchSystemStatusRequest 表示系统状态流订阅请求。
message WatchSystemStatusRequest {
  uint32 interval_seconds = 1;
}

// WatchSystemStatusResponse 返回系统状态流事件。
message WatchSystemStatusResponse {
  Response status = 1;
  SystemStatus system_status = 2;
}

// GetMetricHistoryRequest 表示历史指标查询请求。
message GetMetricHistoryRequest {
  uint64 start_seconds = 1;
  uint64 end_seconds = 2;
}

// GetMetricHistoryResponse 返回历史指标序列。
message GetMetricHistoryResponse {
  Response status = 1;
  repeated SystemStatus samples = 2;
}

// ProcessResourceSnapshot 描述特定时刻附近的进程资源信息。
message ProcessResourceSnapshot {
  string pid = 1;
  string name = 2;
  float cpu_usage_percent = 3;
  uint64 memory_bytes = 4;
}

// GetProcessSnapshotRequest 表示异常时刻进程详情请求。
message GetProcessSnapshotRequest {
  uint64 timestamp_seconds = 1;
  uint32 limit = 2;
}

// GetProcessSnapshotResponse 返回进程资源快照。
message GetProcessSnapshotResponse {
  Response status = 1;
  repeated ProcessResourceSnapshot processes = 2;
}

// GenerateHealthReportRequest 表示运行日报/周报生成请求。
message GenerateHealthReportRequest {
  string period = 1;
}

// GenerateHealthReportResponse 返回健康报告。
message GenerateHealthReportResponse {
  Response status = 1;
  string report = 2;
}

// MonitorService 提供服务器资源监控能力。
service MonitorService {
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  rpc WatchSystemStatus(WatchSystemStatusRequest) returns (stream WatchSystemStatusResponse);
  rpc GetMetricHistory(GetMetricHistoryRequest) returns (GetMetricHistoryResponse);
  rpc GetProcessSnapshot(GetProcessSnapshotRequest) returns (GetProcessSnapshotResponse);
  rpc GenerateHealthReport(GenerateHealthReportRequest) returns (GenerateHealthReportResponse);
}
