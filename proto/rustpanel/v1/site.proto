syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// SiteKind 描述站点的部署形态(Phase C)。
enum SiteKind {
  SITE_KIND_UNSPECIFIED = 0;
  // 静态文件:nginx 直接 serve root_dir
  SITE_KIND_STATIC = 1;
  // Rust 二进制:systemd 启动用户上传的可执行文件,nginx 反代到本地端口
  SITE_KIND_RUST_BINARY = 2;
  // 反向代理:nginx 转发到 upstream URL
  SITE_KIND_REVERSE_PROXY = 3;
}

// SiteBindKind 描述站点对外绑定方式(NAT VPS 关键决策)。
enum SiteBindKind {
  SITE_BIND_KIND_UNSPECIFIED = 0;
  // 占用 NAT VPS 的 1 个公网端口(默认 20 个里挑一)
  SITE_BIND_KIND_NAT_PORT = 1;
  // 直接绑定 /80 IPv6 地址池里的一个 v6,不消耗 NAT 端口
  SITE_BIND_KIND_IPV6_ADDRESS = 2;
}

// SiteTlsStrategy 描述 TLS 来源。
enum SiteTlsStrategy {
  SITE_TLS_STRATEGY_UNSPECIFIED = 0;
  SITE_TLS_STRATEGY_NONE = 1;
  // 走 Phase E 的 ACME DNS-01,适合 NAT VPS
  SITE_TLS_STRATEGY_LETSENCRYPT_DNS01 = 2;
  // 用户自带证书(已通过 Settings → SSL 导入)
  SITE_TLS_STRATEGY_IMPORTED = 3;
}

// SiteBinding 描述站点的对外绑定(Phase C 新增)。
message SiteBinding {
  SiteBindKind kind = 1;
  // NAT_PORT: 端口号 1-65535
  uint32 nat_port = 2;
  // IPV6_ADDRESS: 完整 v6 地址(从 /80 池选一个)
  string ipv6_address = 3;
}

// SiteItem 描述一个站点配置。
message SiteItem {
  string name = 1;
  repeated string domains = 2;
  string root = 3;
  string proxy_target = 4;
  bool ssl_enabled = 5;
  string config_path = 6;
  string engine = 7;
  string public_path = 8;
  string listen_addr = 9;
  // === Phase C 新增 ===
  SiteKind kind = 10;
  SiteBinding binding = 11;
  SiteTlsStrategy tls_strategy = 12;
  // RUST_BINARY 时使用:systemd unit 名(rustpanel-site-<name>.service)
  string systemd_unit = 13;
  // RUST_BINARY 时本地监听端口(仅 nginx 反代用,不占 NAT 端口预算)
  uint32 internal_port = 14;
  // root 目录当前占用字节数;list_sites 时按 60s TTL 缓存。
  // Static 类站点才有意义;其它 kind / 未就绪时为 0。
  uint64 disk_bytes = 15;
  // 上一版部署的备份目录(<root>.previous)如果存在,这里填路径。
  // 前端据此显示"回滚"按钮。无备份留空。
  string previous_backup_path = 16;
}

// RewriteTemplate 描述内置伪静态模板。
message RewriteTemplate {
  string id = 1;
  string name = 2;
  string stack = 3;
  string content = 4;
}

// UpstreamTarget 描述一个反向代理或负载均衡目标。
message UpstreamTarget {
  string url = 1;
  uint32 weight = 2;
  bool healthy = 3;
}

// ReverseProxyRule 描述一条图形化反向代理规则。
message ReverseProxyRule {
  string id = 1;
  string name = 2;
  string domain = 3;
  string path_prefix = 4;
  repeated UpstreamTarget targets = 5;
  string load_balance_method = 6;
  bool cache_enabled = 7;
  uint32 rate_limit_per_minute = 8;
  bool enabled = 9;
  string config_path = 10;
  uint64 created_at_seconds = 11;
  uint64 updated_at_seconds = 12;
}

// ListSitesRequest 表示站点列表请求。
message ListSitesRequest {}

// ListSitesResponse 返回站点列表。
message ListSitesResponse {
  Response status = 1;
  repeated SiteItem sites = 2;
}

// CreateSiteRequest 表示创建站点请求。
message CreateSiteRequest {
  string name = 1;
  repeated string domains = 2;
  string root = 3;
  string proxy_target = 4;
  bool ssl_enabled = 5;
  string engine = 6;
  string listen_addr = 7;
  // === Phase C 新增 ===
  SiteKind kind = 8;
  SiteBinding binding = 9;
  SiteTlsStrategy tls_strategy = 10;
  // RUST_BINARY 时:可执行文件路径(由用户上传或 cargo install 后填入)
  string binary_path = 11;
}

// CreateSiteResponse 返回创建站点结果。
message CreateSiteResponse {
  Response status = 1;
  SiteItem site = 2;
  string rendered_config = 3;
}

// DeleteSiteRequest 表示删除站点请求(按 name 精确匹配)。
message DeleteSiteRequest {
  string name = 1;
}

// DeleteSiteResponse 返回删除站点结果。
message DeleteSiteResponse {
  Response status = 1;
  // 实际清理的副本路径,前端可展示用于审计
  repeated string cleaned_paths = 2;
}

// ReloadNginxRequest 表示 Nginx 配置测试和重载请求。
message ReloadNginxRequest {}

// ReloadNginxResponse 返回 Nginx 重载结果。
message ReloadNginxResponse {
  Response status = 1;
  string output = 2;
}

// ListRewriteTemplatesRequest 表示伪静态模板列表请求。
message ListRewriteTemplatesRequest {}

// ListRewriteTemplatesResponse 返回内置伪静态模板。
message ListRewriteTemplatesResponse {
  Response status = 1;
  repeated RewriteTemplate templates = 2;
}

// RenderRewriteTemplateRequest 表示模板预览请求。
message RenderRewriteTemplateRequest {
  string template_id = 1;
  string custom_content = 2;
}

// RenderRewriteTemplateResponse 返回伪静态配置片段。
message RenderRewriteTemplateResponse {
  Response status = 1;
  string rendered_config = 2;
}

// ListReverseProxyRulesRequest 表示反向代理规则列表请求。
message ListReverseProxyRulesRequest {}

// ListReverseProxyRulesResponse 返回反向代理规则。
message ListReverseProxyRulesResponse {
  Response status = 1;
  repeated ReverseProxyRule rules = 2;
}

// UpsertReverseProxyRuleRequest 表示创建或更新反向代理规则请求。
message UpsertReverseProxyRuleRequest {
  ReverseProxyRule rule = 1;
}

// UpsertReverseProxyRuleResponse 返回保存后的反向代理规则。
message UpsertReverseProxyRuleResponse {
  Response status = 1;
  ReverseProxyRule rule = 2;
  string rendered_config = 3;
}

// DeleteReverseProxyRuleRequest 表示删除反向代理规则请求。
message DeleteReverseProxyRuleRequest {
  string id = 1;
}

// DeleteReverseProxyRuleResponse 返回删除结果。
message DeleteReverseProxyRuleResponse {
  Response status = 1;
}

// 站点 zip 部署走 HTTP POST /api/site/deploy/chunk?...&keep_archive=true|false
// (gRPC-web 不支持 client streaming,大文件用 axum multipart 更顺)。
// 解压进度通过 WS /api/site/deploy/progress 推回。
// 这里只留 RPC:回滚、列归档、删归档,都是小请求小响应。

// RollbackSiteRequest 把 <root>.previous 重新换回 <root>。
// 备份不存在 → FAILED_PRECONDITION。回滚后 .previous 被覆盖,
// 不能二次回滚到再上一版(只保留 1 层备份)。
message RollbackSiteRequest {
  string site_name = 1;
}

message RollbackSiteResponse {
  Response status = 1;
  string deployed_path = 2;
}

// SiteArchive 描述一份保留下来的部署压缩包(用户在上传时打勾"保留压缩包"
// 才会留)。便于一键重新部署 / 下载备份,不勾就自动删,省空间。
message SiteArchive {
  // 归档文件名(不含路径,典型 "20260511-083544.zip")
  string name = 1;
  // 完整磁盘路径,便于 /api/fs/download 拉取
  string path = 2;
  uint64 size_bytes = 3;
  uint64 created_at_seconds = 4;
}

message ListSiteArchivesRequest {
  string site_name = 1;
}

message ListSiteArchivesResponse {
  Response status = 1;
  repeated SiteArchive archives = 2;
}

message DeleteSiteArchiveRequest {
  string site_name = 1;
  // 仅文件名,后端拼到 <site_state>/archives/<site>/<name>;
  // 防 path traversal:不接受 / 或 ..
  string archive_name = 2;
}

message DeleteSiteArchiveResponse {
  Response status = 1;
}

// SiteService 提供站点与反向代理配置能力。
service SiteService {
  rpc ListSites(ListSitesRequest) returns (ListSitesResponse);
  rpc CreateSite(CreateSiteRequest) returns (CreateSiteResponse);
  rpc DeleteSite(DeleteSiteRequest) returns (DeleteSiteResponse);
  rpc ReloadNginx(ReloadNginxRequest) returns (ReloadNginxResponse);
  rpc ListRewriteTemplates(ListRewriteTemplatesRequest) returns (ListRewriteTemplatesResponse);
  rpc RenderRewriteTemplate(RenderRewriteTemplateRequest) returns (RenderRewriteTemplateResponse);
  rpc ListReverseProxyRules(ListReverseProxyRulesRequest) returns (ListReverseProxyRulesResponse);
  rpc UpsertReverseProxyRule(UpsertReverseProxyRuleRequest) returns (UpsertReverseProxyRuleResponse);
  rpc DeleteReverseProxyRule(DeleteReverseProxyRuleRequest) returns (DeleteReverseProxyRuleResponse);
  // 回滚到 .previous 备份(zip 上传走 HTTP /api/site/deploy/chunk)
  rpc RollbackSite(RollbackSiteRequest) returns (RollbackSiteResponse);
  // 列出当前站点保留下来的归档(用户上传时勾"保留压缩包"才有)
  rpc ListSiteArchives(ListSiteArchivesRequest) returns (ListSiteArchivesResponse);
  // 删一份归档(用户腾空间时用)
  rpc DeleteSiteArchive(DeleteSiteArchiveRequest) returns (DeleteSiteArchiveResponse);
}
