syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// FirewallProtocol 描述防火墙规则匹配的网络协议。
enum FirewallProtocol {
  FIREWALL_PROTOCOL_UNSPECIFIED = 0;
  FIREWALL_PROTOCOL_TCP = 1;
  FIREWALL_PROTOCOL_UDP = 2;
  FIREWALL_PROTOCOL_ICMP = 3;
}

// FirewallAction 描述命中规则后的处理动作。
enum FirewallAction {
  FIREWALL_ACTION_UNSPECIFIED = 0;
  FIREWALL_ACTION_ALLOW = 1;
  FIREWALL_ACTION_DENY = 2;
  FIREWALL_ACTION_REJECT = 3;
}

// FirewallDirection 描述规则作用方向。
enum FirewallDirection {
  FIREWALL_DIRECTION_UNSPECIFIED = 0;
  FIREWALL_DIRECTION_INBOUND = 1;
  FIREWALL_DIRECTION_OUTBOUND = 2;
}

// FirewallBackend 描述 RustPanel 可适配的系统防火墙后端。
enum FirewallBackend {
  FIREWALL_BACKEND_UNSPECIFIED = 0;
  FIREWALL_BACKEND_UFW = 1;
  FIREWALL_BACKEND_FIREWALLD = 2;
  FIREWALL_BACKEND_IPTABLES = 3;
}

// WafRuleKind 描述 WAF 规则类别。
enum WafRuleKind {
  WAF_RULE_KIND_UNSPECIFIED = 0;
  WAF_RULE_KIND_CC = 1;
  WAF_RULE_KIND_SQL_INJECTION = 2;
  WAF_RULE_KIND_XSS = 3;
  WAF_RULE_KIND_KEYWORD = 4;
  WAF_RULE_KIND_SCANNER = 5;
}

// SshKeyAlgorithm 描述 SSH 密钥算法。
enum SshKeyAlgorithm {
  SSH_KEY_ALGORITHM_UNSPECIFIED = 0;
  SSH_KEY_ALGORITHM_RSA = 1;
  SSH_KEY_ALGORITHM_ED25519 = 2;
}

// FirewallRule 描述一条可视化防火墙规则。
message FirewallRule {
  string id = 1;
  string name = 2;
  FirewallProtocol protocol = 3;
  FirewallAction action = 4;
  FirewallDirection direction = 5;
  uint32 port_start = 6;
  uint32 port_end = 7;
  string source = 8;
  string destination = 9;
  bool enabled = 10;
  string comment = 11;
  uint64 created_at_seconds = 12;
  uint64 updated_at_seconds = 13;
}

// SecurityOptions 描述系统级入口安全开关。
message SecurityOptions {
  bool disable_ping = 1;
  bool scan_protection_enabled = 2;
  uint32 scan_burst = 3;
  uint32 scan_window_seconds = 4;
  FirewallBackend backend_preference = 5;
  string last_apply_message = 6;
  string panel_access_path = 7;
  string panel_listen_addr = 8;
  bool two_factor_required = 9;
}

// WafSettings 描述 Nginx 层 WAF 总体开关。
message WafSettings {
  bool enabled = 1;
  bool cc_protection_enabled = 2;
  bool captcha_challenge_enabled = 3;
  uint32 requests_per_minute = 4;
  uint32 burst = 5;
  uint32 block_duration_seconds = 6;
  string nginx_config_path = 7;
  string challenge_page_path = 8;
  string last_apply_message = 9;
}

// WafRule 描述一条 Nginx 层 WAF 匹配规则。
message WafRule {
  string id = 1;
  string name = 2;
  WafRuleKind kind = 3;
  string pattern = 4;
  bool enabled = 5;
  string scope_domain = 6;
  string comment = 7;
  uint64 created_at_seconds = 8;
  uint64 updated_at_seconds = 9;
}

// WafAttackEvent 描述一次 WAF 拦截事件。
message WafAttackEvent {
  string id = 1;
  string source_ip = 2;
  string country_code = 3;
  string country_name = 4;
  string rule_id = 5;
  string rule_name = 6;
  WafRuleKind kind = 7;
  string path = 8;
  string user_agent = 9;
  uint64 occurred_at_seconds = 10;
}

// SshSettings 描述 SSH 服务加固配置。
message SshSettings {
  bool service_enabled = 1;
  uint32 port = 2;
  bool password_login_disabled = 3;
  bool auto_ban_enabled = 4;
  uint32 failed_attempt_limit = 5;
  uint32 failed_attempt_window_seconds = 6;
  string config_path = 7;
  string last_apply_message = 8;
}

// SshLoginEvent 描述一次 SSH 登录审计记录。
message SshLoginEvent {
  string id = 1;
  string username = 2;
  string source_ip = 3;
  bool successful = 4;
  bool auto_banned = 5;
  string message = 6;
  uint64 occurred_at_seconds = 7;
}

// SshKeyItem 描述一组 SSH 密钥。
message SshKeyItem {
  string id = 1;
  string name = 2;
  SshKeyAlgorithm algorithm = 3;
  string public_key = 4;
  string private_key_path = 5;
  uint64 created_at_seconds = 6;
}

// ListFirewallRulesRequest 表示防火墙规则列表请求。
message ListFirewallRulesRequest {}

// ListFirewallRulesResponse 返回防火墙规则与全局安全开关。
message ListFirewallRulesResponse {
  Response status = 1;
  repeated FirewallRule rules = 2;
  SecurityOptions options = 3;
}

// UpsertFirewallRuleRequest 表示创建或更新规则请求。
message UpsertFirewallRuleRequest {
  FirewallRule rule = 1;
}

// UpsertFirewallRuleResponse 返回保存后的规则。
message UpsertFirewallRuleResponse {
  Response status = 1;
  FirewallRule rule = 2;
}

// DeleteFirewallRuleRequest 表示删除规则请求。
message DeleteFirewallRuleRequest {
  string id = 1;
}

// DeleteFirewallRuleResponse 返回删除结果。
message DeleteFirewallRuleResponse {
  Response status = 1;
}

// SetFirewallRuleEnabledRequest 表示启用或停用规则请求。
message SetFirewallRuleEnabledRequest {
  string id = 1;
  bool enabled = 2;
}

// SetFirewallRuleEnabledResponse 返回启停结果。
message SetFirewallRuleEnabledResponse {
  Response status = 1;
  FirewallRule rule = 2;
}

// UpdateSecurityOptionsRequest 表示更新安全开关请求。
message UpdateSecurityOptionsRequest {
  SecurityOptions options = 1;
}

// UpdateSecurityOptionsResponse 返回更新后的安全开关。
message UpdateSecurityOptionsResponse {
  Response status = 1;
  SecurityOptions options = 2;
}

// ExportFirewallRulesRequest 表示导出规则备份请求。
message ExportFirewallRulesRequest {}

// ExportFirewallRulesResponse 返回规则备份 JSON。
message ExportFirewallRulesResponse {
  Response status = 1;
  string backup_json = 2;
}

// ImportFirewallRulesRequest 表示导入规则备份请求。
message ImportFirewallRulesRequest {
  string backup_json = 1;
  bool replace_existing = 2;
}

// ImportFirewallRulesResponse 返回导入结果。
message ImportFirewallRulesResponse {
  Response status = 1;
  repeated FirewallRule rules = 2;
  SecurityOptions options = 3;
}

// GetWafSettingsRequest 表示读取 WAF 配置请求。
message GetWafSettingsRequest {}

// GetWafSettingsResponse 返回 WAF 配置。
message GetWafSettingsResponse {
  Response status = 1;
  WafSettings settings = 2;
  repeated WafRule rules = 3;
}

// UpdateWafSettingsRequest 表示更新 WAF 配置请求。
message UpdateWafSettingsRequest {
  WafSettings settings = 1;
}

// UpdateWafSettingsResponse 返回更新后的 WAF 配置。
message UpdateWafSettingsResponse {
  Response status = 1;
  WafSettings settings = 2;
}

// UpsertWafRuleRequest 表示创建或更新 WAF 规则请求。
message UpsertWafRuleRequest {
  WafRule rule = 1;
}

// UpsertWafRuleResponse 返回保存后的 WAF 规则。
message UpsertWafRuleResponse {
  Response status = 1;
  WafRule rule = 2;
}

// DeleteWafRuleRequest 表示删除 WAF 规则请求。
message DeleteWafRuleRequest {
  string id = 1;
}

// DeleteWafRuleResponse 返回删除结果。
message DeleteWafRuleResponse {
  Response status = 1;
}

// ListWafAttackEventsRequest 表示查询 WAF 攻击事件请求。
message ListWafAttackEventsRequest {
  uint32 limit = 1;
}

// ListWafAttackEventsResponse 返回 WAF 事件和聚合视图。
message ListWafAttackEventsResponse {
  Response status = 1;
  repeated WafAttackEvent events = 2;
}

// GetSshSettingsRequest 表示读取 SSH 加固配置请求。
message GetSshSettingsRequest {}

// GetSshSettingsResponse 返回 SSH 加固配置。
message GetSshSettingsResponse {
  Response status = 1;
  SshSettings settings = 2;
  repeated SshKeyItem keys = 3;
}

// UpdateSshSettingsRequest 表示更新 SSH 加固配置请求。
message UpdateSshSettingsRequest {
  SshSettings settings = 1;
}

// UpdateSshSettingsResponse 返回更新后的 SSH 加固配置。
message UpdateSshSettingsResponse {
  Response status = 1;
  SshSettings settings = 2;
}

// GenerateSshKeyRequest 表示在线生成 SSH 密钥请求。
message GenerateSshKeyRequest {
  string name = 1;
  SshKeyAlgorithm algorithm = 2;
}

// GenerateSshKeyResponse 返回生成的 SSH 密钥。
message GenerateSshKeyResponse {
  Response status = 1;
  SshKeyItem key = 2;
}

// ListSshLoginEventsRequest 表示查询 SSH 审计事件请求。
message ListSshLoginEventsRequest {
  uint32 limit = 1;
}

// ListSshLoginEventsResponse 返回 SSH 审计事件。
message ListSshLoginEventsResponse {
  Response status = 1;
  repeated SshLoginEvent events = 2;
}

// RecordSshLoginEventRequest 表示写入 SSH 登录审计事件请求。
message RecordSshLoginEventRequest {
  SshLoginEvent event = 1;
}

// RecordSshLoginEventResponse 返回写入后的审计事件。
message RecordSshLoginEventResponse {
  Response status = 1;
  SshLoginEvent event = 2;
}

// SecurityService 提供系统防火墙和入口安全管理能力。
service SecurityService {
  rpc ListFirewallRules(ListFirewallRulesRequest) returns (ListFirewallRulesResponse);
  rpc UpsertFirewallRule(UpsertFirewallRuleRequest) returns (UpsertFirewallRuleResponse);
  rpc DeleteFirewallRule(DeleteFirewallRuleRequest) returns (DeleteFirewallRuleResponse);
  rpc SetFirewallRuleEnabled(SetFirewallRuleEnabledRequest) returns (SetFirewallRuleEnabledResponse);
  rpc UpdateSecurityOptions(UpdateSecurityOptionsRequest) returns (UpdateSecurityOptionsResponse);
  rpc ExportFirewallRules(ExportFirewallRulesRequest) returns (ExportFirewallRulesResponse);
  rpc ImportFirewallRules(ImportFirewallRulesRequest) returns (ImportFirewallRulesResponse);
  rpc GetWafSettings(GetWafSettingsRequest) returns (GetWafSettingsResponse);
  rpc UpdateWafSettings(UpdateWafSettingsRequest) returns (UpdateWafSettingsResponse);
  rpc UpsertWafRule(UpsertWafRuleRequest) returns (UpsertWafRuleResponse);
  rpc DeleteWafRule(DeleteWafRuleRequest) returns (DeleteWafRuleResponse);
  rpc ListWafAttackEvents(ListWafAttackEventsRequest) returns (ListWafAttackEventsResponse);
  rpc GetSshSettings(GetSshSettingsRequest) returns (GetSshSettingsResponse);
  rpc UpdateSshSettings(UpdateSshSettingsRequest) returns (UpdateSshSettingsResponse);
  rpc GenerateSshKey(GenerateSshKeyRequest) returns (GenerateSshKeyResponse);
  rpc ListSshLoginEvents(ListSshLoginEventsRequest) returns (ListSshLoginEventsResponse);
  rpc RecordSshLoginEvent(RecordSshLoginEventRequest) returns (RecordSshLoginEventResponse);
}
