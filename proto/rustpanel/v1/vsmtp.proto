syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// VsmtpAlias 描述一条 vSMTP 别名转发规则。
// 对外可见地址形如 <alias>@<rustpanel 部署时配置的本域>,
// 来信经 vSMTP rhai 规则改写后转发到 forward_to。
message VsmtpAlias {
  // 对外暴露的本地部分,例如 "amazon" 对应 amazon@yourdomain.com。
  // 全小写字母 + 数字 + 连字符,合法长度由后端校验。
  string alias = 1;
  // 转发到的真实邮箱(Gmail / ProtonMail / 公司邮箱)。
  string forward_to = 2;
  // 备注 / 标签,可选,UI 用来区分用途。
  string note = 3;
  int64 created_at_seconds = 4;
  int64 updated_at_seconds = 5;
}

message ListVsmtpAliasesRequest {}

message ListVsmtpAliasesResponse {
  Response status = 1;
  repeated VsmtpAlias aliases = 2;
}

message UpsertVsmtpAliasRequest {
  VsmtpAlias alias = 1;
}

message UpsertVsmtpAliasResponse {
  Response status = 1;
  VsmtpAlias alias = 2;
}

message DeleteVsmtpAliasRequest {
  string alias = 1;
}

message DeleteVsmtpAliasResponse {
  Response status = 1;
}

// VsmtpAliasService 维护 vSMTP 转发表。
// 实际邮件流由 vSMTP 进程读取生成的 rhai 规则文件,本服务只负责
// 表的 CRUD 与持久化。
service VsmtpAliasService {
  rpc ListVsmtpAliases(ListVsmtpAliasesRequest) returns (ListVsmtpAliasesResponse);
  rpc UpsertVsmtpAlias(UpsertVsmtpAliasRequest) returns (UpsertVsmtpAliasResponse);
  rpc DeleteVsmtpAlias(DeleteVsmtpAliasRequest) returns (DeleteVsmtpAliasResponse);
}
