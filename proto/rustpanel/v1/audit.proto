syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// AuditEvent 描述一条面板操作审计事件。
message AuditEvent {
  string id = 1;
  string user = 2;
  string module = 3;
  string action = 4;
  string description = 5;
  string source_ip = 6;
  string level = 7;
  uint64 timestamp_seconds = 8;
}

// RecordAuditEventRequest 表示写入审计事件请求。
message RecordAuditEventRequest {
  AuditEvent event = 1;
}

// RecordAuditEventResponse 返回写入审计事件结果。
message RecordAuditEventResponse {
  Response status = 1;
  AuditEvent event = 2;
}

// ListAuditEventsRequest 表示审计事件查询请求。
message ListAuditEventsRequest {
  string module = 1;
  string query = 2;
  uint32 limit = 3;
}

// ListAuditEventsResponse 返回审计事件列表。
message ListAuditEventsResponse {
  Response status = 1;
  repeated AuditEvent events = 2;
}

// ClearAuditEventsRequest 表示清理审计事件请求。
message ClearAuditEventsRequest {}

// ClearAuditEventsResponse 返回清理审计事件结果。
message ClearAuditEventsResponse {
  Response status = 1;
}

// AnalyzeAuditEventsRequest 表示日志风险分析请求。
message AnalyzeAuditEventsRequest {
  string query = 1;
  uint32 limit = 2;
}

// AnalyzeAuditEventsResponse 返回日志风险分析结果。
message AnalyzeAuditEventsResponse {
  Response status = 1;
  string summary = 2;
  repeated string risk_findings = 3;
  string provider = 4;
}

// AuditService 提供全行为审计和日志风险分析能力。
service AuditService {
  rpc RecordAuditEvent(RecordAuditEventRequest) returns (RecordAuditEventResponse);
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc ClearAuditEvents(ClearAuditEventsRequest) returns (ClearAuditEventsResponse);
  rpc AnalyzeAuditEvents(AnalyzeAuditEventsRequest) returns (AnalyzeAuditEventsResponse);
}
