syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// CertificateState 描述证书状态。
enum CertificateState {
  CERTIFICATE_STATE_UNSPECIFIED = 0;
  CERTIFICATE_STATE_PENDING = 1;
  CERTIFICATE_STATE_ISSUED = 2;
  CERTIFICATE_STATE_REVOKED = 3;
  CERTIFICATE_STATE_FAILED = 4;
}

// CertificateItem 描述一个站点证书。
message CertificateItem {
  string domain = 1;
  string certificate_path = 2;
  string private_key_path = 3;
  uint64 expires_at_seconds = 4;
  CertificateState state = 5;
  string group = 6;
  int64 days_until_expiry = 7;
  bool auto_renew_enabled = 8;
  string warning_level = 9;
}

// AcmeChallengeType ACME 挑战方式。
enum AcmeChallengeType {
  ACME_CHALLENGE_TYPE_UNSPECIFIED = 0;
  // HTTP-01:需要外部能从 80 端口访问。NAT VPS 通常用不了。
  ACME_CHALLENGE_TYPE_HTTP_01 = 1;
  // DNS-01:面板返回需要写入的 TXT 记录,用户手动加到 DNS,然后回调验证。
  ACME_CHALLENGE_TYPE_DNS_01 = 2;
}

// RequestCertificateRequest 表示申请证书请求。
message RequestCertificateRequest {
  string domain = 1;
  string email = 2;
  // === Phase E 新增 ===
  AcmeChallengeType challenge_type = 3;
  // 仅 DNS-01 用:DNS provider 标识(manual / cloudflare / route53),
  // manual 模式下 panel 只返回 TXT 记录,不直接修改 DNS。
  string dns_provider = 4;
  // 仅 DNS-01 用:provider API token / 凭证(manual 模式留空)。
  string dns_credentials = 5;
}

// RequestCertificateResponse 返回申请证书结果。
message RequestCertificateResponse {
  Response status = 1;
  CertificateItem certificate = 2;
  // DNS-01 manual 模式:需要用户手动添加的 TXT 记录信息。
  // record_name 为完整 FQDN(如 _acme-challenge.example.com),record_value 为 TXT 内容。
  // 用户加完 DNS 后再调一次 RequestCertificate 即可继续验证。
  string dns_record_name = 3;
  string dns_record_value = 4;
}

// RevokeCertificateRequest 表示吊销证书请求。
message RevokeCertificateRequest {
  string domain = 1;
}

// RevokeCertificateResponse 返回吊销证书结果。
message RevokeCertificateResponse {
  Response status = 1;
}

// ListCertificatesRequest 表示证书统一视图请求。
message ListCertificatesRequest {}

// ListCertificatesResponse 返回当前托管证书和过期预警。
message ListCertificatesResponse {
  Response status = 1;
  repeated CertificateItem certificates = 2;
}

// ImportCertificateRequest 表示手动导入商用或自备证书请求。
message ImportCertificateRequest {
  string domain = 1;
  string group = 2;
  string certificate_pem = 3;
  string private_key_pem = 4;
}

// ImportCertificateResponse 返回导入后的证书。
message ImportCertificateResponse {
  Response status = 1;
  CertificateItem certificate = 2;
}

// RenewCertificateRequest 表示立即续签证书请求。
message RenewCertificateRequest {
  string domain = 1;
}

// RenewCertificateResponse 返回续签后的证书。
message RenewCertificateResponse {
  Response status = 1;
  CertificateItem certificate = 2;
  string output = 3;
}

// WatchCertificateProgressRequest 表示证书进度订阅请求。
message WatchCertificateProgressRequest {
  string domain = 1;
}

// WatchCertificateProgressResponse 返回证书进度事件。
message WatchCertificateProgressResponse {
  Response status = 1;
  CertificateItem certificate = 2;
  string message = 3;
}

// SslService 提供 SSL 自动化能力。
service SslService {
  rpc RequestCertificate(RequestCertificateRequest) returns (RequestCertificateResponse);
  rpc RevokeCertificate(RevokeCertificateRequest) returns (RevokeCertificateResponse);
  rpc ListCertificates(ListCertificatesRequest) returns (ListCertificatesResponse);
  rpc ImportCertificate(ImportCertificateRequest) returns (ImportCertificateResponse);
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);
  rpc WatchCertificateProgress(WatchCertificateProgressRequest) returns (stream WatchCertificateProgressResponse);
}
