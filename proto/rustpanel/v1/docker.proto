syntax = "proto3";

package rustpanel.v1;

import "rustpanel/v1/common.proto";

// ContainerPort 描述容器端口映射。
message ContainerPort {
  string ip = 1;
  uint32 private_port = 2;
  uint32 public_port = 3;
  string type = 4;
}

// ContainerItem 描述单个 Docker 容器。
message ContainerItem {
  string id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  string status_text = 5;
  repeated ContainerPort ports = 6;
  int64 created_at_seconds = 7;
  double cpu_limit_cores = 8;
  uint64 memory_limit_bytes = 9;
}

// ImageItem 描述本地镜像。
message ImageItem {
  string id = 1;
  repeated string repo_tags = 2;
  int64 created_at_seconds = 3;
  int64 size_bytes = 4;
  int64 containers = 5;
}

// ComposeProject 描述一个 Docker Compose 项目。
message ComposeProject {
  string name = 1;
  string compose_path = 2;
  string compose_yaml = 3;
  repeated string service_names = 4;
  string status_text = 5;
  int64 updated_at_seconds = 6;
}

// ListContainersRequest 表示容器列表请求。
message ListContainersRequest {
  bool all = 1;
}

// ListContainersResponse 返回容器列表。
message ListContainersResponse {
  Response status = 1;
  repeated ContainerItem containers = 2;
}

// StartContainerRequest 表示启动容器请求。
message StartContainerRequest {
  string container_id = 1;
}

// StartContainerResponse 返回启动容器结果。
message StartContainerResponse {
  Response status = 1;
}

// StopContainerRequest 表示停止容器请求。
message StopContainerRequest {
  string container_id = 1;
}

// StopContainerResponse 返回停止容器结果。
message StopContainerResponse {
  Response status = 1;
}

// RestartContainerRequest 表示重启容器请求。
message RestartContainerRequest {
  string container_id = 1;
}

// RestartContainerResponse 返回重启容器结果。
message RestartContainerResponse {
  Response status = 1;
}

// RemoveContainerRequest 表示删除容器请求。
message RemoveContainerRequest {
  string container_id = 1;
}

// RemoveContainerResponse 返回删除容器结果。
message RemoveContainerResponse {
  Response status = 1;
}

// PauseContainerRequest 表示暂停容器请求。
message PauseContainerRequest {
  string container_id = 1;
}

// PauseContainerResponse 返回暂停容器结果。
message PauseContainerResponse {
  Response status = 1;
}

// PullImageRequest 表示镜像拉取请求。
message PullImageRequest {
  string image = 1;
  string tag = 2;
}

// PullImageResponse 返回镜像拉取结果。
message PullImageResponse {
  Response status = 1;
}

// WatchImagePullRequest 表示镜像拉取进度订阅请求。
message WatchImagePullRequest {
  string image = 1;
  string tag = 2;
}

// WatchImagePullResponse 返回镜像拉取进度事件。
message WatchImagePullResponse {
  Response status = 1;
  string image_id = 2;
  string status_text = 3;
  string progress = 4;
  uint64 current_bytes = 5;
  uint64 total_bytes = 6;
  bool done = 7;
}

// ListImagesRequest 表示本地镜像列表请求。
message ListImagesRequest {
  bool all = 1;
}

// ListImagesResponse 返回本地镜像列表。
message ListImagesResponse {
  Response status = 1;
  repeated ImageItem images = 2;
}

// SetContainerResourcesRequest 表示容器资源配额更新请求。
message SetContainerResourcesRequest {
  string container_id = 1;
  double cpu_limit_cores = 2;
  uint64 memory_limit_bytes = 3;
}

// SetContainerResourcesResponse 返回资源配额更新结果。
message SetContainerResourcesResponse {
  Response status = 1;
  ContainerItem container = 2;
}

// PruneDockerResourcesRequest 表示冗余 Docker 资源清理请求。
message PruneDockerResourcesRequest {
  bool images = 1;
  bool containers = 2;
  bool volumes = 3;
  bool networks = 4;
  bool all_images = 5;
}

// PruneDockerResourcesResponse 返回清理结果。
message PruneDockerResourcesResponse {
  Response status = 1;
  uint32 deleted_count = 2;
  uint64 space_reclaimed_bytes = 3;
  string summary = 4;
}

// RollbackImageTagRequest 表示镜像版本回滚请求。
message RollbackImageTagRequest {
  string source_image = 1;
  string target_repository = 2;
  string target_tag = 3;
}

// RollbackImageTagResponse 返回镜像版本回滚结果。
message RollbackImageTagResponse {
  Response status = 1;
}

// ListComposeProjectsRequest 表示 Compose 项目列表请求。
message ListComposeProjectsRequest {}

// ListComposeProjectsResponse 返回 Compose 项目列表。
message ListComposeProjectsResponse {
  Response status = 1;
  repeated ComposeProject projects = 2;
}

// UpsertComposeProjectRequest 表示新增或更新 Compose 项目请求。
message UpsertComposeProjectRequest {
  string name = 1;
  string compose_yaml = 2;
}

// UpsertComposeProjectResponse 返回 Compose 项目保存结果。
message UpsertComposeProjectResponse {
  Response status = 1;
  ComposeProject project = 2;
}

// DeployComposeProjectRequest 表示部署 Compose 项目请求。
message DeployComposeProjectRequest {
  string name = 1;
}

// DeployComposeProjectResponse 返回 Compose 项目部署结果。
message DeployComposeProjectResponse {
  Response status = 1;
  ComposeProject project = 2;
}

// RemoveComposeProjectRequest 表示移除 Compose 项目请求。
message RemoveComposeProjectRequest {
  string name = 1;
  bool delete_files = 2;
}

// RemoveComposeProjectResponse 返回 Compose 项目移除结果。
message RemoveComposeProjectResponse {
  Response status = 1;
}

// WatchContainerLogsRequest 表示容器日志订阅请求。
message WatchContainerLogsRequest {
  string container_id = 1;
  uint32 tail_lines = 2;
}

// WatchContainerLogsResponse 返回容器日志事件。
message WatchContainerLogsResponse {
  Response status = 1;
  string line = 2;
}

// DockerService 提供 Docker 引擎管理能力。
service DockerService {
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);
  rpc StartContainer(StartContainerRequest) returns (StartContainerResponse);
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);
  rpc RestartContainer(RestartContainerRequest) returns (RestartContainerResponse);
  rpc RemoveContainer(RemoveContainerRequest) returns (RemoveContainerResponse);
  rpc PauseContainer(PauseContainerRequest) returns (PauseContainerResponse);
  rpc PullImage(PullImageRequest) returns (PullImageResponse);
  rpc WatchImagePull(WatchImagePullRequest) returns (stream WatchImagePullResponse);
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc SetContainerResources(SetContainerResourcesRequest) returns (SetContainerResourcesResponse);
  rpc PruneDockerResources(PruneDockerResourcesRequest) returns (PruneDockerResourcesResponse);
  rpc RollbackImageTag(RollbackImageTagRequest) returns (RollbackImageTagResponse);
  rpc ListComposeProjects(ListComposeProjectsRequest) returns (ListComposeProjectsResponse);
  rpc UpsertComposeProject(UpsertComposeProjectRequest) returns (UpsertComposeProjectResponse);
  rpc DeployComposeProject(DeployComposeProjectRequest) returns (DeployComposeProjectResponse);
  rpc RemoveComposeProject(RemoveComposeProjectRequest) returns (RemoveComposeProjectResponse);
  rpc WatchContainerLogs(WatchContainerLogsRequest) returns (stream WatchContainerLogsResponse);
}
