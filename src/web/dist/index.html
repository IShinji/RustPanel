<!doctype html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RustPanel</title>
    <script>
      // 主题预加载:在 React 挂载前应用持久化主题,避免首次渲染闪烁(FOUC)
      (function () {
        try {
          var stored = localStorage.getItem("rustpanel.theme");
          var theme = stored || "light";
          if (theme === "system") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-CIxdUur_.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Lm2dKKPz.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
